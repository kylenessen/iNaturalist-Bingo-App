<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iNaturalist Bingo Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@300&amp;family=Google+Sans+Flex:opsz,wght@6..144,400;6..144,500;6..144,700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="lib/leaflet/leaflet.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="container">
    <header class="app-header">
      <h1>iNaturalist Bingo Cards</h1>
    </header>

    <form id="bingo-form" autocomplete="off">
      <!-- Filtering Options -->
      <fieldset class="filter-fieldset">
        <legend>Filtering Options</legend>

        <div class="filter-option-grid">
          <div class="field filter-option">
            <label class="filter-toggle">
              <input type="checkbox" id="taxa-filter-enabled">
              <span class="toggle-track" aria-hidden="true"></span>
              <span>Filter by category</span>
            </label>
            <div id="taxa-select-wrapper" class="multi-select-wrapper hidden">
              <div class="option-group-label">Categories to include</div>
              <div id="taxa-checkboxes" class="checkbox-group" aria-label="Categories to include"></div>
            </div>
          </div>

          <div class="field filter-option">
            <label class="filter-toggle">
              <input type="checkbox" id="month-filter-enabled">
              <span class="toggle-track" aria-hidden="true"></span>
              <span>Filter by months</span>
            </label>
            <div id="month-select-wrapper" class="multi-select-wrapper hidden">
              <div class="option-group-label">Months to include</div>
              <div id="month-checkboxes" class="checkbox-group" aria-label="Months to include"></div>
            </div>
          </div>
        </div>
      </fieldset>

      <!-- Place Controls -->
      <fieldset class="place-settings-fieldset">
        <legend>Place Settings</legend>
        <div class="field place-search-field">
          <label for="place-input">iNaturalist place</label>
          <input type="text" id="place-input" placeholder="Start typing a place name…">
          <ul id="place-dropdown" class="dropdown hidden"></ul>
          <input type="hidden" id="place-id" value="">
          <small id="place-display"></small>
          <details id="place-map-panel" class="place-map-panel hidden">
            <summary>
              <span>Place boundary</span>
            </summary>
            <div class="place-map-body">
              <div id="place-map" class="place-map hidden" aria-label="Selected place boundary"></div>
              <small id="place-map-status" class="place-map-status" role="status" aria-live="polite"></small>
            </div>
          </details>
        </div>
      </fieldset>

      <!-- Card Controls -->
      <fieldset class="card-settings-fieldset">
        <legend>Card Settings</legend>

        <div class="field grid-size-field">
          <div class="field-label">Card size</div>
          <div id="grid-size" class="grid-size-options" role="radiogroup" aria-label="Card size">
            <label class="grid-size-option">
              <input type="radio" name="grid-size" value="3">
              <span class="grid-size-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" focusable="false">
                  <rect x="2" y="2" width="14" height="14" rx="1"></rect>
                  <path d="M6.33 2v14M11.67 2v14M2 6.33h14M2 11.67h14"></path>
                </svg>
              </span>
              <span>3 × 3</span>
            </label>
            <label class="grid-size-option">
              <input type="radio" name="grid-size" value="5" checked>
              <span class="grid-size-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" focusable="false">
                  <rect x="2" y="2" width="14" height="14" rx="1"></rect>
                  <path d="M4.8 2v14M7.6 2v14M10.4 2v14M13.2 2v14M2 4.8h14M2 7.6h14M2 10.4h14M2 13.2h14"></path>
                </svg>
              </span>
              <span>5 × 5</span>
            </label>
            <label class="grid-size-option">
              <input type="radio" name="grid-size" value="7">
              <span class="grid-size-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" focusable="false">
                  <rect x="2" y="2" width="14" height="14" rx="1"></rect>
                  <path d="M4 2v14M6.33 2v14M8.67 2v14M11 2v14M13.33 2v14M2 4h14M2 6.33h14M2 8.67h14M2 11h14M2 13.33h14"></path>
                </svg>
              </span>
              <span>7 × 7</span>
            </label>
            <label class="grid-size-option">
              <input type="radio" name="grid-size" value="9">
              <span class="grid-size-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" focusable="false">
                  <rect x="2" y="2" width="14" height="14" rx="1"></rect>
                  <path d="M3.56 2v14M5.33 2v14M7.11 2v14M8.89 2v14M10.67 2v14M12.44 2v14M14.22 2v14M2 3.56h14M2 5.33h14M2 7.11h14M2 8.89h14M2 10.67h14M2 12.44h14M2 14.22h14"></path>
                </svg>
              </span>
              <span>9 × 9</span>
            </label>
          </div>
        </div>

        <div class="field species-pool-field">
          <label for="top-n">Species pool size <span id="top-n-value">75</span></label>
          <div class="species-pool-controls">
            <input type="range" id="top-n" min="25" max="100" value="75" step="1">
            <input type="number" id="top-n-input" min="25" max="100" value="75" step="1">
          </div>
          <small id="top-n-bounds" class="hidden">25 minimum</small>
          <small id="top-n-warning" class="field-warning hidden" role="status" aria-live="polite"></small>
        </div>

        <div class="inline-field-grid">
          <div class="field">
            <label for="num-cards">Number of cards</label>
            <input type="number" id="num-cards" min="1" max="100" value="10">
          </div>

          <div class="field">
            <label for="seed">Random seed (optional)</label>
            <input type="number" id="seed" value="0">
          </div>
        </div>

      </fieldset>

      <!-- Display Options -->
      <fieldset>
        <legend>Display Options</legend>

        <div class="display-option-row">
          <div class="field option-row-field">
            <label class="inline-check"><input type="checkbox" id="photo-on" checked><span>Photo</span></label>
          </div>
          <div class="field option-row-field">
            <label class="inline-check"><input type="checkbox" id="common-on" checked><span>Common name</span></label>
          </div>
          <div class="field option-row-field">
            <label class="inline-check"><input type="checkbox" id="sci-on" checked><span>Scientific name</span></label>
          </div>
          <div class="field option-row-field">
            <label class="inline-check"><input type="checkbox" id="free-square"><span>Center free square</span></label>
          </div>
        </div>
        <div class="field">
          <label for="doc-title">Document title</label>
          <input type="text" id="doc-title" value="">
        </div>
      </fieldset>

      <button type="submit" id="generate-btn">Generate</button>
    </form>

    <!-- Status Messages -->
    <div id="status" class="status hidden"></div>
    <div id="error" class="error hidden"></div>

    <!-- Card Preview -->
    <div id="preview-section" class="hidden">
      <h2>Preview</h2>
      <div id="preview-nav" class="preview-nav">
        <button type="button" id="prev-card" disabled>&larr; Previous</button>
        <span id="card-counter">Card 1 of 1</span>
        <button type="button" id="next-card" disabled>Next &rarr;</button>
      </div>
      <div id="card-container"></div>
      <button type="button" id="download-pdf" class="download-btn">Download PDF</button>
    </div>

    <!-- Hidden container for PDF rendering -->
    <div id="pdf-render-area" class="pdf-render-area"></div>
  </main>

  <script src="lib/jspdf.umd.min.js"></script>
  <script src="lib/html2canvas.min.js"></script>
  <script src="lib/leaflet/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
